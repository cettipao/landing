name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # Version is inferred from "packageManager" in package.json.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        env:
          # Used by src/lib/github.ts to query the GraphQL API for pinned
          # repos and the user's contribution calendar. The default
          # GITHUB_TOKEN is sufficient for public data; if the user adds a
          # personal access token as the GH_USER_TOKEN secret it takes
          # priority and unlocks higher rate limits.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USER_TOKEN: ${{ secrets.GH_USER_TOKEN }}
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
